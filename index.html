<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendOrder - Retail Order Punch & Dispatch</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#FAFAFA] text-[#1A1A1A] antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Minimalist Royal Blue Professional Logo
    const Logo = () => (
      <div className="flex items-center gap-3 mb-8">
        <div className="w-12 h-12 bg-blue-700 rounded-xl flex items-center justify-center shadow-lg">
          <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div className="flex flex-col">
          <span className="text-xl font-bold text-blue-900 tracking-tight">Send Order</span>
          <span className="text-[10px] text-blue-600 font-semibold uppercase tracking-widest">Dispatch Pro</span>
        </div>
      </div>
    );

    const Footer = () => (
      <div className="text-center text-[10px] text-gray-400 mt-12 py-4 border-t border-gray-100">
        App made by Nilu Baba
      </div>
    );

    function App() {
      const [profile, setProfile] = useState(null);
      const [tempName, setTempName] = useState('');
      const [tempStore, setTempStore] = useState('');
      const [orders, setOrders] = useState([]);
      const [currentView, setCurrentView] = useState('dashboard');
      const [editingOrder, setEditingOrder] = useState(null);
      const [showNewOrderModal, setShowNewOrderModal] = useState(false);
      const [newBrandName, setNewBrandName] = useState('');
      const [showShareModal, setShowShareModal] = useState(false);
      const [whatsAppNumber, setWhatsAppNumber] = useState('');

      useEffect(() => {
        const storedProfile = localStorage.getItem('sendorder_profile');
        if (storedProfile) setProfile(JSON.parse(storedProfile));
        const storedOrders = localStorage.getItem('sendorder_orders');
        if (storedOrders) setOrders(JSON.parse(storedOrders));
      }, []);

      const saveProfile = (e) => {
        e.preventDefault();
        const data = { name: tempName, store: tempStore };
        localStorage.setItem('sendorder_profile', JSON.stringify(data));
        setProfile(data);
      };

      const handleStartNewOrder = (e) => {
        e.preventDefault();
        const order = {
          id: `ord_${Date.now()}`,
          brandName: newBrandName,
          status: 'pending',
          createdAt: new Date().toISOString(),
          items: [{ id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        };
        setEditingOrder(order);
        setShowNewOrderModal(false);
        setCurrentView('edit-order');
      };

      const addItemRow = () => {
        setEditingOrder({
          ...editingOrder,
          items: [...editingOrder.items, { id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        });
      };

      const handleUpdateItem = (id, field, val) => {
        const newItems = editingOrder.items.map(it => it.id === id ? {...it, [field]: val} : it);
        setEditingOrder({...editingOrder, items: newItems});
      };

      const handleSaveOrder = () => {
        const updated = [editingOrder, ...orders.filter(o => o.id !== editingOrder.id)];
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setCurrentView('dashboard');
      };

      const executeWhatsApp = (e) => {
        e.preventDefault();
        const itemsList = editingOrder.items
          .filter(i => i.name || i.code)
          .map(i => `• ${i.name || 'N/A'} (Code: ${i.code || '-'}, Size: ${i.size || '-'}, Qty: ${i.qty || '0'})`)
          .join('\n');
        
        const message = `*Dispatch Order: ${editingOrder.brandName}*\n\nItems:\n${itemsList}\n\nSent by: ${profile.name} (${profile.store})`;
        window.open(`https://wa.me/${whatsAppNumber}?text=${encodeURIComponent(message)}`, '_blank');
        
        const updated = orders.map(o => o.id === editingOrder.id ? {...o, status: 'sent'} : o);
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setShowShareModal(false);
        setCurrentView('dashboard');
      };

      if (!profile) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#F8FAFC]">
            <div className="w-full max-w-sm bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
              <Logo/>
              <form onSubmit={saveProfile} className="space-y-4">
                <input required placeholder="Staff Name" onChange={e=>setTempName(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"/>
                <input required placeholder="Store Name" onChange={e=>setTempStore(e.target.value)} className="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"/>
                <button type="submit" className="w-full bg-blue-700 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-200">Start Dispatching</button>
              </form>
            </div>
            <Footer/>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto p-6 min-h-screen flex flex-col">
          <Logo/>
          <div className="flex-grow">
          {currentView === 'dashboard' ? (
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <h1 className="text-lg font-bold text-gray-800">Ready To Order today?</h1>
                <button onClick={() => setShowNewOrderModal(true)} className="bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200">+ New</button>
              </div>
              <div className="grid gap-3">
                {orders.map(o => (
                  <div key={o.id} className="bg-white p-5 rounded-2xl border border-gray-100 flex justify-between items-center cursor-pointer hover:border-blue-200 transition" onClick={() => {setEditingOrder(o); setCurrentView('edit-order');}}>
                    <div>
                      <p className="font-bold text-gray-900">{o.brandName}</p>
                      <p className="text-[10px] text-gray-400 mt-1">{new Date(o.createdAt).toLocaleDateString()}</p>
                    </div>
                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${o.status === 'sent' ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}`}>{o.status}</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="space-y-6">
              <button onClick={() => setCurrentView('dashboard')} className="text-xs text-blue-600 font-bold tracking-wide">← BACK TO DASHBOARD</button>
              <input value={editingOrder.brandName} onChange={e=>setEditingOrder({...editingOrder, brandName: e.target.value})} className="text-3xl font-bold w-full bg-transparent outline-none text-gray-900"/>
              
              <div className="space-y-2">
                {editingOrder.items.map((item, idx) => (
                  <div key={item.id} className="grid grid-cols-5 gap-2 items-center text-xs">
                    <input placeholder="Code" value={item.code} onChange={e=>handleUpdateItem(item.id,'code',e.target.value)} className="p-3 bg-gray-50 rounded-lg w-full outline-none"/>
                    <input placeholder="Product Name" value={item.name} onChange={e=>handleUpdateItem(item.id,'name',e.target.value)} className="col-span-2 p-3 bg-gray-50 rounded-lg w-full outline-none"/>
                    <input placeholder="Size" value={item.size} onChange={e=>handleUpdateItem(item.id,'size',e.target.value)} className="p-3 bg-gray-50 rounded-lg w-full outline-none"/>
                    <input placeholder="Qty" value={item.qty} onChange={e=>handleUpdateItem(item.id,'qty',e.target.value)} className="p-3 bg-gray-50 rounded-lg w-full outline-none"/>
                  </div>
                ))}
              </div>

              <button onClick={addItemRow} className="w-full py-3 border-2 border-dashed border-gray-200 rounded-xl text-gray-500 text-xs font-bold hover:bg-blue-50 hover:text-blue-600 transition">+ Add Product Row</button>

              <div className="flex gap-4 pt-4">
                <button onClick={handleSaveOrder} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold text-sm text-gray-600">Save Draft</button>
                <button onClick={() => setShowShareModal(true)} className="flex-1 p-4 bg-blue-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-200">Confirm & Send</button>
              </div>
            </div>
          )}
          </div>
          <Footer/>

          {showNewOrderModal && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4">
              <form onSubmit={handleStartNewOrder} className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h3 className="font-bold text-lg mb-4">New Order Sheet</h3>
                <input required placeholder="Enter Brand Name" className="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none" onChange={e=>setNewBrandName(e.target.value)}/>
                <button type="submit" className="w-full bg-blue-700 text-white p-4 rounded-xl font-bold">Create Sheet</button>
              </form>
            </div>
          )}

          {showShareModal && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4">
              <form onSubmit={executeWhatsApp} className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h3 className="font-bold text-lg mb-4">Send via WhatsApp</h3>
                <input required className="w-full p-4 bg-gray-50 rounded-xl mb-4 outline-none" placeholder="WhatsApp Number (e.g. 919876543210)" onChange={e=>setWhatsAppNumber(e.target.value)}/>
                <div className="flex gap-2">
                  <button type="button" onClick={() => setShowShareModal(false)} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold text-sm">Cancel</button>
                  <button type="submit" className="flex-1 bg-green-600 text-white p-4 rounded-xl font-bold text-sm">Send Now</button>
                </div>
              </form>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
