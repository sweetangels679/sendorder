<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendOrder - Retail Order Punch & Dispatch</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#FAFAFA] text-[#1A1A1A] antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // SVG Icons
    const PlusIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>;
    const TrashIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
    const ShareIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.684 10.742l4.632-2.316m0 0a3 3 0 10-2.684-1.342L6 9.4m7.316-1.074a3 3 0 102.684 1.342L8.684 11.258m0 0a3 3 0 102.684 1.342l4.632-2.316m-4.632 2.316L6 14.6"/></svg>;
    const CheckIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;
    const ClockIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>;
    const ArrowLeftIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>;
    const PackageIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>;
    const SmartphoneIcon = () => <svg className="w-8 h-8" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 006 3.75v16.5a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 20.25V3.75a2.25 2.25 0 00-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3"/></svg>;

    function App() {
      const [profile, setProfile] = useState(null);
      const [tempName, setTempName] = useState('');
      const [tempStore, setTempStore] = useState('');
      const [orders, setOrders] = useState([]);
      const [currentView, setCurrentView] = useState('dashboard');
      const [editingOrder, setEditingOrder] = useState(null);
      const [showNewOrderModal, setShowNewOrderModal] = useState(false);
      const [newBrandName, setNewBrandName] = useState('');
      const [showShareModal, setShowShareModal] = useState(false);
      const [targetOrder, setTargetOrder] = useState(null);
      const [whatsAppNumber, setWhatsAppNumber] = useState('');
      const [notification, setNotification] = useState(null);

      useEffect(() => {
        const storedProfile = localStorage.getItem('sendorder_profile');
        if (storedProfile) setProfile(JSON.parse(storedProfile));
        const storedOrders = localStorage.getItem('sendorder_orders');
        if (storedOrders) setOrders(JSON.parse(storedOrders));
      }, []);

      const saveProfile = (e) => {
        e.preventDefault();
        const data = { name: tempName, store: tempStore };
        localStorage.setItem('sendorder_profile', JSON.stringify(data));
        setProfile(data);
      };

      const handleStartNewOrder = (e) => {
        e.preventDefault();
        const order = {
          id: `ord_${Date.now()}`,
          brandName: newBrandName,
          status: 'pending',
          createdAt: new Date().toISOString(),
          items: [{ id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        };
        setEditingOrder(order);
        setShowNewOrderModal(false);
        setCurrentView('edit-order');
      };

      const handleUpdateItem = (id, field, val) => {
        const newItems = editingOrder.items.map(it => it.id === id ? {...it, [field]: val} : it);
        setEditingOrder({...editingOrder, items: newItems});
      };

      const handleSaveOrder = () => {
        const updated = [editingOrder, ...orders.filter(o => o.id !== editingOrder.id)];
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setCurrentView('dashboard');
      };

      const handleDispatch = () => {
        setTargetOrder(editingOrder);
        setShowShareModal(true);
      };

      const executeWhatsApp = (e) => {
        e.preventDefault();
        const message = `*Dispatch Order: ${targetOrder.brandName}*\n\nItems:\n${targetOrder.items.map(i => i.name).join('\n')}`;
        window.open(`https://wa.me/${whatsAppNumber}?text=${encodeURIComponent(message)}`, '_blank');
        const updated = orders.map(o => o.id === targetOrder.id ? {...o, status: 'sent'} : o);
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setShowShareModal(false);
        setCurrentView('dashboard');
      };

      if (!profile) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="w-full max-w-sm bg-white p-8 rounded-2xl shadow-sm border border-[#E5E5E5]">
              <div className="text-center mb-6"><SmartphoneIcon /><h1 className="text-xl font-bold mt-2">SendOrder Setup</h1></div>
              <form onSubmit={saveProfile} className="space-y-4">
                <input required placeholder="Staff Name" onChange={e=>setTempName(e.target.value)} className="w-full p-3 border rounded-xl"/>
                <input required placeholder="Store Name" onChange={e=>setTempStore(e.target.value)} className="w-full p-3 border rounded-xl"/>
                <button type="submit" className="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Start Dispatching</button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto p-4 py-8">
          {currentView === 'dashboard' ? (
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <h1 className="text-2xl font-bold">Ready To Order today?</h1>
                <button onClick={() => setShowNewOrderModal(true)} className="bg-green-600 text-white px-5 py-3 rounded-xl font-bold flex items-center gap-2"><PlusIcon/> New Order</button>
              </div>
              <div className="grid gap-4">
                {orders.map(o => (
                  <div key={o.id} className="bg-white p-5 rounded-xl border border-[#E5E5E5] flex justify-between items-center" onClick={() => {setEditingOrder(o); setCurrentView('edit-order');}}>
                    <div>
                      <p className="font-bold">{o.brandName}</p>
                      <p className="text-xs text-gray-500">{new Date(o.createdAt).toLocaleDateString()}</p>
                    </div>
                    <span className={`px-3 py-1 rounded-full text-xs font-bold ${o.status === 'sent' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{o.status}</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="space-y-6">
              <button onClick={() => setCurrentView('dashboard')} className="flex items-center gap-2"><ArrowLeftIcon/> Back</button>
              <input value={editingOrder.brandName} onChange={e=>setEditingOrder({...editingOrder, brandName: e.target.value})} className="text-2xl font-bold w-full bg-transparent"/>
              {editingOrder.items.map(item => (
                <div key={item.id} className="grid grid-cols-4 gap-2">
                  <input placeholder="Code" value={item.code} onChange={e=>handleUpdateItem(item.id,'code',e.target.value)} className="p-2 border rounded-lg"/>
                  <input placeholder="Name" value={item.name} onChange={e=>handleUpdateItem(item.id,'name',e.target.value)} className="col-span-2 p-2 border rounded-lg"/>
                  <input placeholder="Qty" value={item.qty} onChange={e=>handleUpdateItem(item.id,'qty',e.target.value)} className="p-2 border rounded-lg"/>
                </div>
              ))}
              <div className="flex gap-4">
                <button onClick={handleSaveOrder} className="flex-1 p-3 bg-gray-100 rounded-xl font-bold">Save Draft</button>
                <button onClick={handleDispatch} className="flex-1 p-3 bg-green-600 text-white rounded-xl font-bold">Confirm & Send</button>
              </div>
            </div>
          )}

          {showNewOrderModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
              <form onSubmit={handleStartNewOrder} className="bg-white p-6 rounded-2xl w-full max-w-sm">
                <h3 className="font-bold mb-4">Enter Brand Name</h3>
                <input required className="w-full p-3 border rounded-xl mb-4" onChange={e=>setNewBrandName(e.target.value)}/>
                <button type="submit" className="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Create Sheet</button>
              </form>
            </div>
          )}

          {showShareModal && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4">
              <form onSubmit={executeWhatsApp} className="bg-white p-6 rounded-2xl w-full max-w-sm">
                <h3 className="font-bold mb-4">WhatsApp Number</h3>
                <input required className="w-full p-3 border rounded-xl mb-4" placeholder="+91..." onChange={e=>setWhatsAppNumber(e.target.value)}/>
                <button type="submit" className="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Send to Brand</button>
              </form>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
