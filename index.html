<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendOrder - Retail Order Punch & Dispatch</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX rendering -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- jsPDF for premium PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="bg-[#FAFAFA] text-[#1A1A1A]">
  <div id="root"></div>

  <!-- React Codebase -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Robust, zero-lag inline SVG Icons (Lucide Replacements)
    const PlusIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>;
    const TrashIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
    const ShareIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8.684 10.742l4.632-2.316m0 0a3 3 0 10-2.684-1.342L6 9.4m7.316-1.074a3 3 0 102.684 1.342L8.684 11.258m0 0a3 3 0 102.684 1.342l4.632-2.316m-4.632 2.316L6 14.6"/></svg>;
    const SearchIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>;
    const ChevronRightIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7"/></svg>;
    const CheckIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>;
    const ClockIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>;
    const ArrowLeftIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>;
    const FileTextIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>;
    const DownloadIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>;
    const CalendarIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>;
    const PackageIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>;
    const PhoneIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>;
    const EditIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>;
    const WarningIcon = () => <svg className="w-12 h-12 text-red-500 mx-auto" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>;

    // Local formatting helpers
    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    };

    const formatTime = (dateStr) => {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit'
      });
    };

    function App() {
      const [profile, setProfile] = useState(null);
      const [tempName, setTempName] = useState('');
      const [tempStore, setTempStore] = useState('');
      
      const [orders, setOrders] = useState([]);
      const [currentView, setCurrentView] = useState('dashboard'); // dashboard, edit-order
      const [editingOrder, setEditingOrder] = useState(null);

      // Modals
      const [showNewOrderModal, setShowNewOrderModal] = useState(false);
      const [newBrandName, setNewBrandName] = useState('');
      const [showShareModal, setShowShareModal] = useState(false);
      const [targetOrder, setTargetOrder] = useState(null);
      const [whatsAppNumber, setWhatsAppNumber] = useState('');
      const [brandPhoneDirectory, setBrandPhoneDirectory] = useState({});
      
      // Delete Confirmation Modal
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [orderIdToDelete, setOrderIdToDelete] = useState(null);

      // Search & Filters
      const [searchQuery, setSearchQuery] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      
      const [notification, setNotification] = useState(null);
      const [isExporting, setIsExporting] = useState(false);

      const triggerNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // Load Profile & Orders on Start
      useEffect(() => {
        const storedProfile = localStorage.getItem('sendorder_profile');
        if (storedProfile) {
          setProfile(JSON.parse(storedProfile));
        }

        const storedOrders = localStorage.getItem('sendorder_orders');
        if (storedOrders) {
          setOrders(JSON.parse(storedOrders));
        } else {
          // Default beautiful starter logs for context
          const starterOrders = [
            {
              id: 'starter_1',
              brandName: 'Levi Strauss Co.',
              status: 'sent',
              phone: '919876543210',
              createdAt: new Date(Date.now() - 3600000 * 2).toISOString(),
              updatedAt: new Date(Date.now() - 3600000 * 2).toISOString(),
              items: [
                { id: 'item_1', code: 'LEV-501-BLU', name: '501 Original Fit Denim', size: '32', qty: '12' },
                { id: 'item_2', code: 'LEV-JCK-BLK', name: 'Standard Trucker Jacket', size: 'XL', qty: '4' }
              ]
            },
            {
              id: 'starter_2',
              brandName: 'Zara Apparel',
              status: 'pending',
              phone: '',
              createdAt: new Date(Date.now() - 3600000 * 24).toISOString(),
              updatedAt: new Date(Date.now() - 3600000 * 24).toISOString(),
              items: [
                { id: 'item_3', code: 'ZR-BLZ-WHT', name: 'Classic White Blazer', size: 'M', qty: '6' }
              ]
            }
          ];
          setOrders(starterOrders);
          localStorage.setItem('sendorder_orders', JSON.stringify(starterOrders));
        }

        const storedDirectory = localStorage.getItem('sendorder_directory');
        if (storedDirectory) {
          setBrandPhoneDirectory(JSON.parse(storedDirectory));
        }
      }, []);

      const saveProfile = (e) => {
        e.preventDefault();
        if (!tempName.trim() || !tempStore.trim()) return;
        const newProfile = { name: tempName.trim(), store: tempStore.trim() };
        localStorage.setItem('sendorder_profile', JSON.stringify(newProfile));
        setProfile(newProfile);
        triggerNotification(`Welcome, retail session active!`);
      };

      const handleStartNewOrder = (e) => {
        e.preventDefault();
        if (!newBrandName.trim()) return;

        const cleanBrand = newBrandName.trim();
        const rememberedPhone = brandPhoneDirectory[cleanBrand.toLowerCase()] || '';

        const placeholder = {
          id: `ord_${Date.now()}`,
          brandName: cleanBrand,
          status: 'pending',
          phone: rememberedPhone,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString(),
          items: [{ id: `item_1_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        };

        setEditingOrder(placeholder);
        setNewBrandName('');
        setShowNewOrderModal(false);
        setCurrentView('edit-order');
      };

      const handleUpdateItemField = (itemId, fieldName, value) => {
        if (!editingOrder) return;
        const updatedItems = editingOrder.items.map(item => {
          if (item.id === itemId) return { ...item, [fieldName]: value };
          return item;
        });
        setEditingOrder({ ...editingOrder, items: updatedItems });
      };

      const handleAddNewLineItem = () => {
        const nextId = `item_${editingOrder.items.length + 1}_${Date.now()}`;
        setEditingOrder({
          ...editingOrder,
          items: [...editingOrder.items, { id: nextId, code: '', name: '', size: '', qty: '' }]
        });
      };

      const handleRemoveLineItem = (itemId) => {
        if (editingOrder.items.length <= 1) return;
        setEditingOrder({
          ...editingOrder,
          items: editingOrder.items.filter(item => item.id !== itemId)
        });
      };

      const handleSaveOrderLocally = (orderObject, isQuiet = false) => {
        const validItems = orderObject.items.filter(it => 
          it.code.trim() || it.name.trim() || it.size.trim() || it.qty.trim()
        );

        const orderToSave = {
          ...orderObject,
          items: validItems.length > 0 ? validItems : orderObject.items,
          updatedAt: new Date().toISOString()
        };

        const updatedOrders = [orderToSave, ...orders.filter(o => o.id !== orderToSave.id)];
        updatedOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
        setOrders(updatedOrders);
        localStorage.setItem('sendorder_orders', JSON.stringify(updatedOrders));

        if (!isQuiet) triggerNotification(`Draft saved for "${orderToSave.brandName}"`);
      };

      const handleSaveAndExit = () => {
        handleSaveOrderLocally(editingOrder, false);
        setCurrentView('dashboard');
      };

      const handleConfirmOrderFlow = () => {
        const hasContent = editingOrder.items.some(it => 
          it.code.trim() || it.name.trim() || it.size.trim() || it.qty.trim()
        );

        if (!hasContent) {
          triggerNotification("Please fill in at least one field to confirm.", "error");
          return;
        }

        setTargetOrder(editingOrder);
        setWhatsAppNumber(editingOrder.phone || '');
        setShowShareModal(true);
      };

      const generateCSV = (order) => {
        let content = `SendOrder Sheet - Brand Dispatch\r\n`;
        content += `Brand,${order.brandName}\r\n`;
        content += `Date,${formatDate(order.createdAt)} ${formatTime(order.createdAt)}\r\n`;
        content += `Staff,${profile.name} (${profile.store})\r\n\r\n`;
        content += `Item Code,Item Name,Size,Quantity\r\n`;

        order.items.forEach(it => {
          content += `"${it.code || '-'}","${it.name || '-'}","${it.size || '-'}","${it.qty || '-'}"\r\n`;
        });

        const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `SendOrder_${order.brandName.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const generatePDF = (order) => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF();

          // Brand Minimalist Accent Bar
          doc.setFillColor(5, 150, 105); // #059669 Emerald Green
          doc.rect(0, 0, 210, 8, 'F');

          doc.setFont("helvetica", "bold");
          doc.setFontSize(22);
          doc.setTextColor(26, 26, 26);
          doc.text("SENDORDER DISPATCH FORM", 15, 25);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.setTextColor(115, 115, 115);
          doc.text(`Created on: ${formatDate(order.createdAt)} at ${formatTime(order.createdAt)}`, 15, 31);

          doc.setDrawColor(229, 229, 229);
          doc.line(15, 36, 195, 36);

          // Details
          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          doc.text("BRAND / MANUFACTURER", 15, 46);
          doc.text("RETAILER DISPATCHED BY", 110, 46);

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.setTextColor(64, 64, 64);
          doc.text(`Brand Name: ${order.brandName}`, 15, 53);
          doc.text(`WhatsApp Destination: ${order.phone || 'N/A'}`, 15, 59);

          doc.text(`Operator Name: ${profile.name}`, 110, 53);
          doc.text(`Store Origin: ${profile.store}`, 110, 59);

          doc.line(15, 66, 195, 66);

          // Table Headers
          doc.setFillColor(250, 250, 250);
          doc.rect(15, 73, 180, 8, 'F');
          doc.setFont("helvetica", "bold");
          doc.setFontSize(9);
          doc.setTextColor(64, 64, 64);
          doc.text("ITEM CODE", 18, 78);
          doc.text("ITEM NAME", 58, 78);
          doc.text("SIZE", 140, 78);
          doc.text("QTY", 175, 78);

          doc.setDrawColor(229, 229, 229);
          doc.line(15, 81, 195, 81);

          let currentY = 87;
          doc.setFont("helvetica", "normal");
          doc.setTextColor(26, 26, 26);

          order.items.forEach((it, index) => {
            if (currentY > 270) {
              doc.addPage();
              currentY = 25;
            }

            if (index % 2 === 1) {
              doc.setFillColor(248, 250, 252);
              doc.rect(15, currentY - 5, 180, 7.5, 'F');
            }

            doc.text(it.code || '-', 18, currentY);
            doc.text(it.name || '-', 58, currentY);
            doc.text(it.size || '-', 140, currentY);
            doc.text(it.qty || '-', 175, currentY);

            doc.setDrawColor(241, 245, 249);
            doc.line(15, currentY + 2.5, 195, currentY + 2.5);

            currentY += 8;
          });

          doc.setFont("helvetica", "italic");
          doc.setFontSize(8);
          doc.setTextColor(148, 163, 184);
          doc.text("This dispatch was compiled and downloaded securely via SendOrder.", 15, 285);

          doc.save(`SendOrder_${order.brandName.replace(/\s+/g, '_')}.pdf`);
        } catch (err) {
          console.error("PDF Fail, using CSV fallback", err);
          generateCSV(order);
        }
      };

      const handleExecuteWhatsAppShare = (e) => {
        e.preventDefault();
        let sanitized = whatsAppNumber.replace(/\D/g, '');
        if (!sanitized) return;

        if (sanitized.length === 10) sanitized = '91' + sanitized;

        // Remember phone for next time
        const updatedDirectory = { ...brandPhoneDirectory, [targetOrder.brandName.toLowerCase()]: sanitized };
        setBrandPhoneDirectory(updatedDirectory);
        localStorage.setItem('sendorder_directory', JSON.stringify(updatedDirectory));

        const orderToUpdate = {
          ...targetOrder,
          status: 'sent',
          phone: sanitized,
          updatedAt: new Date().toISOString()
        };

        handleSaveOrderLocally(orderToUpdate, true);

        // Compile WhatsApp text representation
        let messageText = `*📦 SENDORDER DISPATCH - ${orderToUpdate.brandName.toUpperCase()}*\n`;
        messageText += `*Date:* ${formatDate(orderToUpdate.createdAt)} ${formatTime(orderToUpdate.createdAt)}\n`;
        messageText += `*Operator:* ${profile.name} (${profile.store})\n`;
        messageText += `--------------------------------------\n`;

        orderToUpdate.items.forEach((it, idx) => {
          const code = it.code ? `[Code: ${it.code}]` : '';
          const name = it.name ? `*${it.name}*` : 'Product';
          const size = it.size ? ` (Size: ${it.size})` : '';
          const qty = it.qty ? ` - Qty: ${it.qty}` : '';
          messageText += `${idx + 1}. ${code} ${name}${size}${qty}\n`;
        });

        messageText += `--------------------------------------\n`;
        messageText += `_Order dispatch forms (PDF and Excel/CSV) compiled and downloaded to device._`;

        setIsExporting(true);
        setTimeout(() => {
          generatePDF(orderToUpdate);
          setIsExporting(false);
          setShowShareModal(false);
          setTargetOrder(null);
          setCurrentView('dashboard');
          triggerNotification("Order dispatch initialized!");
          
          window.open(`https://wa.me/${sanitized}?text=${encodeURIComponent(messageText)}`, '_blank');
        }, 500);
      };

      const handleDeleteOrderInitiate = (orderId) => {
        setOrderIdToDelete(orderId);
        setShowDeleteModal(true);
      };

      const executeDeleteOrder = () => {
        const updated = orders.filter(o => o.id !== orderIdToDelete);
        setOrders(updated);
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setShowDeleteModal(false);
        setOrderIdToDelete(null);
        setCurrentView('dashboard');
        triggerNotification("Order deleted successfully.");
      };

      const filteredOrders = orders.filter(o => {
        const query = searchQuery.toLowerCase().trim();
        const matchesQuery = 
          o.brandName.toLowerCase().includes(query) ||
          o.items.some(i => i.name.toLowerCase().includes(query) || i.code.toLowerCase().includes(query));
        
        if (statusFilter === 'all') return matchesQuery;
        return matchesQuery && o.status === statusFilter;
      });

      // Group date-wise chronological
      const groupedOrders = {};
      filteredOrders.forEach(o => {
        const dateStr = formatDate(o.createdAt);
        if (!groupedOrders[dateStr]) groupedOrders[dateStr] = [];
        groupedOrders[dateStr].push(o);
      });

      // Show splash profile setup on first launch
      if (!profile) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="w-full max-w-md bg-white border border-[#E5E5E5] rounded-2xl p-8 shadow-sm">
              <div className="text-center mb-8">
                <div className="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-emerald-100">
                  <Smartphone size={32} className="stroke-[1.5]" />
                </div>
                <h1 className="text-2xl font-bold tracking-tight text-[#1A1A1A]">SendOrder Setup</h1>
                <p className="text-sm text-[#737373] mt-2">Personalize your Brand Dispatch Sheets instantly</p>
              </div>

              <form onSubmit={saveProfile} className="space-y-5">
                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-[#737373] mb-1.5">Operator / Your Name</label>
                  <input 
                    type="text" 
                    required 
                    value={tempName}
                    onChange={e => setTempName(e.target.value)}
                    placeholder="e.g. Sarah Mitchell"
                    className="w-full px-3.5 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                  />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase tracking-wider text-[#737373] mb-1.5">Retail Store Name</label>
                  <input 
                    type="text" 
                    required 
                    value={tempStore}
                    onChange={e => setTempStore(e.target.value)}
                    placeholder="e.g. Fashion Boulevard Store"
                    className="w-full px-3.5 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                  />
                </div>

                <button 
                  type="submit"
                  className="w-full mt-2 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl text-sm transition-all shadow-sm flex items-center justify-center space-x-2"
                >
                  <CheckIcon />
                  <span>Launch Free Workspace</span>
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="sticky top-0 bg-white/95 backdrop-blur-md border-b border-[#E5E5E5] z-30 px-4 py-3.5 shadow-xs">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <div className="w-9 h-9 bg-emerald-50 rounded-lg flex items-center justify-center text-emerald-600 border border-emerald-100">
                  <PackageIcon />
                </div>
                <div>
                  <h1 className="text-md font-bold tracking-tight text-[#1A1A1A]">SendOrder</h1>
                  <p className="text-[10px] text-emerald-600 font-bold uppercase tracking-wider flex items-center">
                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block mr-1.5 animate-pulse"></span>
                    Local Workspace Active
                  </p>
                </div>
              </div>

              <div className="flex items-center space-x-4">
                <div className="text-right">
                  <span className="text-xs font-semibold block text-[#1A1A1A]">{profile.name}</span>
                  <span className="text-[10px] text-[#737373]">{profile.store}</span>
                </div>
                <button 
                  onClick={() => {
                    if (confirm("Reset layout operator details?")) {
                      localStorage.removeItem('sendorder_profile');
                      setProfile(null);
                    }
                  }}
                  className="p-2 text-neutral-400 hover:text-red-500 rounded-lg hover:bg-neutral-50 transition-colors"
                  title="Configure operator"
                >
                  <LogOut size={16} />
                </button>
              </div>
            </div>
          </header>

          <main className="flex-grow max-w-5xl w-full mx-auto px-4 py-6">
            {currentView === 'dashboard' && (
              <div className="space-y-6">
                
                {/* Dashboard Action Header */}
                <div className="bg-white border border-[#E5E5E5] rounded-2xl p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 shadow-xs">
                  <div className="space-y-1">
                    <h2 className="text-xl font-bold tracking-tight text-[#1A1A1A]">Ready To Order today?</h2>
                    <p className="text-sm text-[#737373]">Punch items, compile beautiful documents, and dispatch directly to brand WhatsApp representative chats.</p>
                  </div>
                  <button
                    onClick={() => setShowNewOrderModal(true)}
                    className="self-start sm:self-center px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm transition-all flex items-center space-x-2 shadow-xs whitespace-nowrap"
                  >
                    <PlusIcon />
                    <span>Punch New Order</span>
                  </button>
                </div>

                {/* Audit Performance Panel */}
                <div className="bg-white border border-[#E5E5E5] rounded-2xl overflow-hidden shadow-xs">
                  
                  {/* Filter and Search controls */}
                  <div className="p-5 border-b border-[#F1F5F9] space-y-4">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-3">
                      <h3 className="font-semibold text-base text-[#1A1A1A]">Retail Order Logs Audit</h3>
                      
                      <div className="flex items-center space-x-1.5">
                        {['all', 'sent', 'pending'].map(st => (
                          <button 
                            key={st}
                            onClick={() => setStatusFilter(st)}
                            className={`px-3 py-1.5 rounded-lg text-xs font-semibold capitalize transition-all ${
                              statusFilter === st 
                                ? 'bg-neutral-900 text-white' 
                                : 'bg-neutral-50 text-neutral-600 hover:bg-neutral-100'
                            }`}
                          >
                            {st === 'pending' ? 'Drafts' : st}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="relative">
                      <div className="absolute left-3 top-3 text-[#A3A3A3]"><SearchIcon /></div>
                      <input 
                        type="text" 
                        value={searchQuery}
                        onChange={e => setSearchQuery(e.target.value)}
                        placeholder="Search sheets by brand name, product code, size..."
                        className="w-full pl-10 pr-4 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all placeholder:text-[#A3A3A3]"
                      />
                    </div>
                  </div>

                  {/* Orders logs listgrouped datewise */}
                  {Object.keys(groupedOrders).length === 0 ? (
                    <div className="p-12 text-center text-neutral-400">
                      <p className="font-medium text-sm text-neutral-500">No logs found</p>
                      <p className="text-xs mt-1">Start by clicking the "Punch New Order" button on the panel above.</p>
                    </div>
                  ) : (
                    <div className="divide-y divide-[#F1F5F9]">
                      {Object.keys(groupedOrders).map(dateKey => (
                        <div key={dateKey} className="p-4 md:p-6 space-y-3">
                          
                          <div className="flex items-center space-x-2 text-neutral-400 text-xs font-bold tracking-wider uppercase">
                            <CalendarIcon />
                            <span>{dateKey}</span>
                            <span className="text-[10px] bg-slate-100 px-2 py-0.5 rounded-full text-slate-600 font-bold">
                              {groupedOrders[dateKey].length} sheets
                            </span>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {groupedOrders[dateKey].map(order => (
                              <div 
                                key={order.id}
                                onClick={() => selectOrderToEdit(order)}
                                className="bg-[#FCFCFC] border border-[#E5E5E5] hover:border-emerald-300 rounded-xl p-4 transition-all hover:shadow-xs cursor-pointer relative group flex flex-col justify-between"
                              >
                                <div>
                                  <div className="flex items-start justify-between">
                                    <div>
                                      <h4 className="font-bold text-md text-[#1a1a1a] group-hover:text-emerald-700 transition-colors">
                                        {order.brandName}
                                      </h4>
                                    </div>
                                    <span className={`px-2 py-0.5 rounded-full text-[9px] font-bold tracking-wide uppercase flex items-center space-x-1 ${
                                      order.status === 'sent' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'
                                    }`}>
                                      {order.status === 'sent' ? <><CheckIcon /><span>Sent</span></> : <><ClockIcon /><span>Draft</span></>}
                                    </span>
                                  </div>

                                  <div className="mt-3.5 pt-3.5 border-t border-[#F1F5F9] text-xs text-neutral-600 space-y-1.5">
                                    <p className="font-semibold flex items-center text-neutral-500">
                                      <PackageIcon /> 
                                      <span className="ml-1.5">Products ({order.items.length})</span>
                                    </p>
                                    <div className="space-y-1 text-[#737373]">
                                      {order.items.slice(0, 3).map((it, idx) => (
                                        <div key={idx} className="flex justify-between text-[11px]">
                                          <span className="truncate max-w-[190px]">{it.name || 'Unnamed Product'}</span>
                                          <span className="font-medium">Qty: {it.qty || '1'}</span>
                                        </div>
                                      ))}
                                      {order.items.length > 3 && (
                                        <p className="text-[10px] text-emerald-600 font-bold">+ {order.items.length - 3} more items...</p>
                                      )}
                                    </div>
                                  </div>
                                </div>

                                <div className="mt-4 pt-3 border-t border-[#F1F5F9] flex items-center justify-between text-[11px] text-neutral-400">
                                  <span>Punch Time: {formatTime(order.createdAt)}</span>
                                  <span className="text-emerald-600 font-semibold group-hover:translate-x-1 transition-transform flex items-center">
                                    Edit Details <ChevronRightIcon />
                                  </span>
                                </div>
                              </div>
                            ))}
                          </div>

                        </div>
                      ))}
                    </div>
                  )}

                </div>

              </div>
            )}

            {/* VIEW: ORDER ENTRY SHEET FORM */}
            {currentView === 'edit-order' && editingOrder && (
              <div className="space-y-6">
                
                {/* Form header actions */}
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <button 
                    onClick={handleSaveAndExit}
                    className="flex items-center space-x-2 text-sm text-[#737373] hover:text-[#1a1a1a] transition-colors self-start font-medium"
                  >
                    <ArrowLeftIcon />
                    <span>Back to Log Dashboard</span>
                  </button>

                  <div className="flex items-center space-x-2.5 self-end sm:self-auto">
                    <button 
                      onClick={() => handleDeleteOrderInitiate(editingOrder.id)}
                      className="p-2.5 text-neutral-400 hover:text-red-500 border border-neutral-200 hover:border-red-100 rounded-xl hover:bg-red-50 transition-all"
                      title="Delete Order"
                    >
                      <TrashIcon />
                    </button>

                    <button 
                      onClick={handleSaveAndExit}
                      className="px-4 py-2 bg-white hover:bg-neutral-50 text-neutral-700 font-semibold border border-[#D4D4D4] rounded-xl text-sm transition-all"
                    >
                      Save as Draft
                    </button>

                    <button 
                      onClick={handleConfirmOrderFlow}
                      className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm transition-all flex items-center space-x-2 shadow-xs"
                    >
                      <ShareIcon />
                      <span>Confirm & Send to Brand</span>
                    </button>
                  </div>
                </div>

                {/* Form layout */}
                <div className="bg-white border border-[#E5E5E5] rounded-2xl p-4 md:p-8 shadow-xs space-y-6">
                  
                  {/* Brand info segment */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-6 border-b border-neutral-100">
                    <div>
                      <label className="block text-xs font-bold uppercase tracking-wider text-[#737373] mb-1.5">Brand / Vendor Name</label>
                      <input 
                        type="text" 
                        value={editingOrder.brandName}
                        onChange={e => setEditingOrder({ ...editingOrder, brandName: e.target.value })}
                        className="w-full px-3.5 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl font-bold text-lg focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-[#1a1a1a]"
                        placeholder="Brand Name"
                      />
                    </div>

                    <div className="flex flex-col justify-end md:items-end text-xs text-neutral-400 space-y-1 mt-3 md:mt-0">
                      <p>Created: <span className="font-semibold text-neutral-600">{formatDate(editingOrder.createdAt)} {formatTime(editingOrder.createdAt)}</span></p>
                      <p>Staff: <span className="font-semibold text-neutral-600">{profile.name} ({profile.store})</span></p>
                      <div className="flex items-center space-x-1 mt-1">
                        <span className={`w-2 h-2 rounded-full inline-block mr-1 ${editingOrder.status === 'sent' ? 'bg-emerald-500' : 'bg-amber-500'}`}></span>
                        <span className="font-semibold text-neutral-600 uppercase tracking-wider">
                          Status: {editingOrder.status === 'sent' ? 'Sent' : 'Draft'}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Table segment list */}
                  <div>
                    <div className="flex items-center justify-between mb-4">
                      <h3 className="font-bold text-sm tracking-wide uppercase text-neutral-500 flex items-center">
                        <span className="mr-2"><PackageIcon /></span>
                        Order Products Punch Lists
                      </h3>
                      <button 
                        onClick={handleAddNewLineItem}
                        className="px-3 py-1.5 text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-lg hover:bg-emerald-100 transition-colors flex items-center space-x-1"
                      >
                        <PlusIcon />
                        <span>Add Line Item</span>
                      </button>
                    </div>

                    {/* Table column headers for desktop */}
                    <div className="hidden md:grid grid-cols-12 gap-3 px-3 py-2 bg-neutral-50 rounded-lg text-xs font-bold text-neutral-500 uppercase tracking-wider mb-2">
                      <div className="col-span-3">Item Code</div>
                      <div className="col-span-4">Item Name</div>
                      <div className="col-span-2">Size</div>
                      <div className="col-span-2">Qty</div>
                      <div className="col-span-1 text-center font-bold">Action</div>
                    </div>

                    {/* Form loop row details */}
                    <div className="space-y-3 md:space-y-2">
                      {editingOrder.items.map((item, index) => (
                        <div 
                          key={item.id}
                          className="grid grid-cols-1 md:grid-cols-12 gap-3 p-4 md:p-1.5 bg-[#FCFCFC] md:bg-transparent border border-neutral-200 md:border-none rounded-xl relative"
                        >
                          <div className="absolute -left-6 top-4 hidden lg:flex items-center justify-center text-[10px] font-bold text-neutral-300 w-5 h-5 rounded-full border border-neutral-200">
                            {index + 1}
                          </div>

                          <div className="col-span-1 md:col-span-3">
                            <label className="block md:hidden text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">Item Code</label>
                            <input 
                              type="text" 
                              value={item.code}
                              placeholder="e.g. LEV-501"
                              onChange={e => handleUpdateItemField(item.id, 'code', e.target.value)}
                              className="w-full px-3 py-2 bg-white md:bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                            />
                          </div>

                          <div className="col-span-1 md:col-span-4">
                            <label className="block md:hidden text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">Item Name</label>
                            <input 
                              type="text" 
                              value={item.name}
                              placeholder="e.g. Denim Original Fit Jeans"
                              onChange={e => handleUpdateItemField(item.id, 'name', e.target.value)}
                              className="w-full px-3 py-2 bg-white md:bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                            />
                          </div>

                          <div className="col-span-1 md:col-span-2">
                            <label className="block md:hidden text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">Size</label>
                            <input 
                              type="text" 
                              value={item.size}
                              placeholder="e.g. 32 / L"
                              onChange={e => handleUpdateItemField(item.id, 'size', e.target.value)}
                              className="w-full px-3 py-2 bg-white md:bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                            />
                          </div>

                          <div className="col-span-1 md:col-span-2">
                            <label className="block md:hidden text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">Quantity</label>
                            <input 
                              type="number" 
                              value={item.qty}
                              placeholder="e.g. 15"
                              min="1"
                              onChange={e => handleUpdateItemField(item.id, 'qty', e.target.value)}
                              className="w-full px-3 py-2 bg-white md:bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800 font-semibold"
                            />
                          </div>

                          <div className="col-span-1 md:col-span-1 flex items-center justify-end md:justify-center pt-2 md:pt-0">
                            <button 
                              onClick={() => handleRemoveLineItem(item.id)}
                              className="p-2 text-neutral-400 hover:text-red-500 rounded-lg hover:bg-red-50 transition-all flex items-center space-x-1.5 md:space-x-0"
                            >
                              <TrashIcon />
                              <span className="text-xs md:hidden font-medium">Delete row</span>
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>

                    <button
                      onClick={handleAddNewLineItem}
                      className="w-full mt-4 py-3 border-2 border-dashed border-[#E5E5E5] hover:border-emerald-400 rounded-xl text-sm font-semibold text-neutral-500 hover:text-emerald-600 transition-all flex items-center justify-center space-x-1.5"
                    >
                      <PlusIcon />
                      <span>Add Another Product Line</span>
                    </button>
                  </div>

                  <div className="bg-slate-50 border border-slate-100 rounded-xl p-4 flex items-start space-x-3">
                    <div className="text-slate-400 shrink-0 mt-0.5"><ClockIcon /></div>
                    <p className="text-xs text-slate-600 leading-relaxed">
                      *Note: All items are optional. Leave code, name, size or quantity blank as per brand and manufacturer requirements. Dynamic sheets adjust columns instantly.
                    </p>
                  </div>

                </div>

                {/* Bottom confirmation panels */}
                <div className="flex justify-between items-center bg-white border border-[#E5E5E5] p-4 rounded-xl shadow-xs">
                  <span className="text-xs text-neutral-400">Lines punched: {editingOrder.items.length}</span>
                  <div className="space-x-2">
                    <button 
                      onClick={handleSaveAndExit}
                      className="px-4 py-2 text-sm font-semibold text-neutral-500 hover:text-neutral-800"
                    >
                      Save Draft
                    </button>
                    <button 
                      onClick={handleConfirmOrderFlow}
                      className="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl text-sm transition-all"
                    >
                      Confirm Order & Dispatch
                    </button>
                  </div>
                </div>

              </div>
            )}
          </main>

          {/* NEW BRAND INITIATION MODAL */}
          {showNewOrderModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 p-4">
              <div className="w-full max-w-md bg-white border border-[#E5E5E5] rounded-2xl p-6 shadow-xl relative animate-in fade-in zoom-in duration-200">
                <h3 className="text-lg font-bold text-[#1A1A1A] mb-1.5">Punch New Order</h3>
                <p className="text-xs text-[#737373] mb-5">Enter the manufacturer or brand name to start your order punch sheet.</p>

                <form onSubmit={handleStartNewOrder} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase tracking-wider text-[#737373] mb-1.5">Brand / Supplier Name</label>
                    <input 
                      type="text" 
                      required
                      value={newBrandName}
                      onChange={e => setNewBrandName(e.target.value)}
                      placeholder="e.g. Nike, Levi's, Zara"
                      className="w-full px-3.5 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-all text-neutral-800"
                      autoFocus
                    />
                  </div>

                  <div className="flex items-center justify-end space-x-3 pt-2">
                    <button 
                      type="button"
                      onClick={() => {
                        setNewBrandName('');
                        setShowNewOrderModal(false);
                      }}
                      className="px-4 py-2 text-xs font-semibold text-neutral-500 hover:text-[#1a1a1a] transition-all"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl transition-all"
                    >
                      Open Sheet
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* BRAND DISPATCH EXPORTS & WHATSAPP MODAL */}
          {showShareModal && targetOrder && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 p-4">
              <div className="w-full max-w-md bg-white border border-[#E5E5E5] rounded-2xl p-6 shadow-xl relative animate-in fade-in zoom-in duration-200">
                <div className="flex items-center space-x-3 mb-4 text-emerald-600">
                  <div className="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center border border-emerald-100">
                    <PhoneIcon />
                  </div>
                  <div>
                    <h3 className="text-md font-bold text-[#1A1A1A]">Dispatch via WhatsApp</h3>
                    <p className="text-xs text-[#737373]">Send sheet directly to manufacturer rep</p>
                  </div>
                </div>

                <form onSubmit={handleExecuteWhatsAppShare} className="space-y-4">
                  <div className="p-4 bg-neutral-50 rounded-xl border border-neutral-100 text-xs text-neutral-600 space-y-1.5">
                    <p className="font-bold text-[#1a1a1a]">{targetOrder.brandName}</p>
                    <p>Total products in queue: <span className="font-bold">{targetOrder.items.length} items</span></p>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase tracking-wider text-[#737373] mb-1.5">WhatsApp Mobile Number</label>
                    <div className="relative">
                      <div className="absolute left-3.5 top-3.5 text-[#A3A3A3]"><PhoneIcon /></div>
                      <input 
                        type="tel" 
                        required
                        value={whatsAppNumber}
                        onChange={e => setWhatsAppNumber(e.target.value)}
                        placeholder="e.g. 9876543210 (include country code)"
                        className="w-full pl-10 pr-4 py-2.5 bg-[#FAFAFA] border border-[#E5E5E5] rounded-xl text-sm focus:outline-none focus:border-emerald-500 focus:bg-white transition-colors text-neutral-800"
                      />
                    </div>
                    <p className="text-[10px] text-neutral-400 mt-1">
                      Include country code (e.g. 91 for India). Numbers are remembered per brand to make future orders instantaneous!
                    </p>
                  </div>

                  <div className="space-y-2 pt-2">
                    <span className="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider">Automated Dispatch Packages Compiled:</span>
                    <div className="grid grid-cols-2 gap-2">
                      <div className="p-2.5 border border-emerald-100 bg-emerald-50/50 rounded-lg flex items-center space-x-2 text-[11px] text-emerald-700 font-semibold">
                        <FileTextIcon />
                        <span>PDF Dispatch (.pdf)</span>
                      </div>
                      <div className="p-2.5 border border-slate-100 bg-slate-50 rounded-lg flex items-center space-x-2 text-[11px] text-slate-700 font-semibold">
                        <DownloadIcon />
                        <span>Excel Spreadsheet (.csv)</span>
                      </div>
                    </div>
                  </div>

                  <div className="flex items-center justify-end space-x-3 pt-4 border-t border-[#F1F5F9]">
                    <button 
                      type="button"
                      onClick={() => {
                        setTargetOrder(null);
                        setShowShareModal(false);
                      }}
                      className="px-4 py-2 text-xs font-semibold text-neutral-500 hover:text-[#1a1a1a] transition-all"
                    >
                      Cancel
                    </button>

                    <button 
                      type="submit"
                      disabled={isExporting}
                      className="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl transition-all flex items-center space-x-1.5 shadow-sm disabled:opacity-50"
                    >
                      <ShareIcon />
                      <span>{isExporting ? "Compiling documents..." : "Share Order via WhatsApp"}</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* DELETE CONFIRMATION MODAL */}
          {showDeleteModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 p-4">
              <div className="w-full max-w-sm bg-white border border-[#E5E5E5] rounded-2xl p-6 shadow-xl relative animate-in fade-in zoom-in duration-200 text-center space-y-4">
                <WarningIcon />
                <h3 className="text-lg font-bold text-[#1A1A1A]">Delete This Order?</h3>
                <p className="text-xs text-[#737373] leading-relaxed">This action cannot be undone. All product logs and timestamps for this dispatch will be deleted permanently from your history log.</p>

                <div className="grid grid-cols-2 gap-3 pt-2">
                  <button 
                    type="button"
                    onClick={() => {
                      setShowDeleteModal(false);
                      setOrderIdToDelete(null);
                    }}
                    className="px-4 py-2.5 text-xs font-semibold border border-[#E5E5E5] rounded-xl hover:bg-neutral-50 transition-all text-neutral-600"
                  >
                    Cancel
                  </button>
                  <button 
                    type="button"
                    onClick={executeDeleteOrder}
                    className="px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-xl transition-all"
                  >
                    Delete Permanently
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-white border-t border-[#E5E5E5] py-5 px-4 text-center mt-auto">
            <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between text-xs text-[#737373] gap-2">
              <p>&copy; 2026 SendOrder Retail Solutions. Secure Browser Storage Mode active.</p>
              <p className="flex items-center space-x-1.5 font-medium">
                <span className="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
                <span>Operating Offline Mode (Free)</span>
              </p>
            </div>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
