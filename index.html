<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendOrder - Retail Order Punch & Dispatch</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-[#FAFAFA] text-[#1A1A1A] antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Custom Blue Brand Logo based on uploaded design
    const Logo = () => (
      <div className="flex items-center gap-3 mb-8">
        <svg className="w-14 h-14" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          {/* Document Sheet */}
          <path d="M30 15H66L76 25V75H30V15Z" fill="white" stroke="#1D4ED8" strokeWidth="4" strokeLinejoin="round" />
          <path d="M66 15V25H76" fill="none" stroke="#1D4ED8" strokeWidth="4" strokeLinejoin="round" />
          
          {/* Lines & Checkboxes */}
          <rect x="38" y="27" width="5" height="5" fill="#1D4ED8" rx="1" />
          <line x1="48" y1="29.5" x2="65" y2="29.5" stroke="#1D4ED8" strokeWidth="3" strokeLinecap="round" />
          
          <rect x="38" y="41" width="5" height="5" fill="#1D4ED8" rx="1" />
          <line x1="48" y1="43.5" x2="65" y2="43.5" stroke="#1D4ED8" strokeWidth="3" strokeLinecap="round" />
          
          <rect x="38" y="55" width="5" height="5" fill="#1D4ED8" rx="1" />
          <line x1="48" y1="57.5" x2="60" y2="57.5" stroke="#1D4ED8" strokeWidth="3" strokeLinecap="round" />
          
          {/* Arrow pointing right */}
          <line x1="72" y1="45" x2="98" y2="45" stroke="#1D4ED8" strokeWidth="4" strokeLinecap="round" />
          <polygon points="96,38 108,45 96,52" fill="#1D4ED8" />
          <line x1="88" y1="52" x2="94" y2="52" stroke="#1D4ED8" strokeWidth="3" strokeLinecap="round" />
          
          {/* WhatsApp speech bubble covering the bottom right corner */}
          <circle cx="68" cy="65" r="14" fill="white" stroke="#1D4ED8" strokeWidth="4" />
          <path d="M57.5 72.5 L55 80 L62.5 77.5" fill="white" stroke="#1D4ED8" strokeWidth="4" strokeLinejoin="round" />
          
          {/* Phone Handset inside bubble */}
          <g transform="translate(68, 65) scale(0.55) translate(-12, -12)">
            <path d="M18.2 14.5c-1 0-2-.3-2.9-.9-.3-.2-.7-.2-1 0l-1.3 1c-2.3-1.2-4.1-3-5.3-5.3l1-1.3c.2-.3.2-.7 0-1-.6-.9-.9-1.9-.9-2.9 0-.6-.5-1-1-1H4.2c-.6 0-1 .5-1 1C3.2 14.1 11.9 22.8 22 22.8c.6 0 1-.5 1-1v-2.9c0-.6-.4-1-.9-1z" fill="#1D4ED8" />
          </g>
        </svg>
        <div className="flex flex-col">
          <span className="text-2xl font-bold text-blue-900 tracking-tight leading-none">Send Order</span>
          <span className="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">Dispatch Pro</span>
        </div>
      </div>
    );

    const Footer = () => (
      <div className="text-center text-[11px] text-gray-400 mt-12 py-4 border-t border-gray-100">
        App made by Nilu Baba
      </div>
    );

    const PlusIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>;
    const ArrowLeftIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>;
    const TrashIcon = () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;

    function App() {
      const [profile, setProfile] = useState(null);
      const [tempName, setTempName] = useState('');
      const [tempStore, setTempStore] = useState('');
      const [orders, setOrders] = useState([]);
      const [currentView, setCurrentView] = useState('dashboard');
      const [editingOrder, setEditingOrder] = useState(null);
      const [showNewOrderModal, setShowNewOrderModal] = useState(false);
      const [newBrandName, setNewBrandName] = useState('');
      const [showShareModal, setShowShareModal] = useState(false);
      const [whatsAppNumber, setWhatsAppNumber] = useState('');

      useEffect(() => {
        const storedProfile = localStorage.getItem('sendorder_profile');
        if (storedProfile) setProfile(JSON.parse(storedProfile));
        const storedOrders = localStorage.getItem('sendorder_orders');
        if (storedOrders) setOrders(JSON.parse(storedOrders));
      }, []);

      const saveProfile = (e) => {
        e.preventDefault();
        const data = { name: tempName, store: tempStore };
        localStorage.setItem('sendorder_profile', JSON.stringify(data));
        setProfile(data);
      };

      const handleStartNewOrder = (e) => {
        e.preventDefault();
        const order = {
          id: `ord_${Date.now()}`,
          brandName: newBrandName,
          status: 'pending',
          createdAt: new Date().toISOString(),
          items: [{ id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        };
        setEditingOrder(order);
        setShowNewOrderModal(false);
        setCurrentView('edit-order');
      };

      const addItemRow = () => {
        setEditingOrder({
          ...editingOrder,
          items: [...editingOrder.items, { id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
        });
      };

      const handleRemoveItemRow = (itemId) => {
        if (editingOrder.items.length <= 1) {
          setEditingOrder({
            ...editingOrder,
            items: [{ id: `item_${Date.now()}`, code: '', name: '', size: '', qty: '' }]
          });
          return;
        }
        const filtered = editingOrder.items.filter(item => item.id !== itemId);
        setEditingOrder({ ...editingOrder, items: filtered });
      };

      const handleUpdateItem = (id, field, val) => {
        const newItems = editingOrder.items.map(it => it.id === id ? {...it, [field]: val} : it);
        setEditingOrder({...editingOrder, items: newItems});
      };

      const handleSaveOrder = () => {
        const updated = [editingOrder, ...orders.filter(o => o.id !== editingOrder.id)];
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setCurrentView('dashboard');
      };

      const handleDeleteOrder = (orderId) => {
        const confirmDelete = window.confirm("Are you sure you want to delete this order permanently?");
        if (!confirmDelete) return;
        const updated = orders.filter(o => o.id !== orderId);
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setCurrentView('dashboard');
      };

      const executeWhatsApp = (e) => {
        e.preventDefault();
        const itemsList = editingOrder.items
          .filter(i => i.name || i.code)
          .map(i => `• ${i.name || 'N/A'} (Code: ${i.code || '-'}, Size: ${i.size || '-'}, Qty: ${i.qty || '0'})`)
          .join('\n');
        
        const message = `*Dispatch Order: ${editingOrder.brandName}*\n\nItems:\n${itemsList}\n\nSent by: ${profile.name} (${profile.store})`;
        window.open(`https://wa.me/${whatsAppNumber}?text=${encodeURIComponent(message)}`, '_blank');
        
        const updated = orders.map(o => o.id === editingOrder.id ? {...o, status: 'sent'} : o);
        localStorage.setItem('sendorder_orders', JSON.stringify(updated));
        setOrders(updated);
        setShowShareModal(false);
        setCurrentView('dashboard');
      };

      if (!profile) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#F8FAFC]">
            <div className="w-full max-w-sm bg-white p-8 rounded-3xl shadow-sm border border-gray-200">
              <Logo/>
              <form onSubmit={saveProfile} className="space-y-4">
                <div className="space-y-1">
                  <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Staff Name</label>
                  <input required placeholder="Enter full name" onChange={e=>setTempName(e.target.value)} className="w-full p-4 bg-white border-2 border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition font-medium text-gray-800"/>
                </div>
                <div className="space-y-1">
                  <label className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Store Name</label>
                  <input required placeholder="Enter store/retail name" onChange={e=>setTempStore(e.target.value)} className="w-full p-4 bg-white border-2 border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition font-medium text-gray-800"/>
                </div>
                <button type="submit" className="w-full bg-blue-700 hover:bg-blue-800 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-200 transition">Start Dispatching</button>
              </form>
            </div>
            <Footer/>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto p-6 min-h-screen flex flex-col">
          <Logo/>
          
          <div className="flex-grow">
          {currentView === 'dashboard' ? (
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <h1 className="text-xl font-bold text-gray-800">Ready To Order today?</h1>
                <button onClick={() => setShowNewOrderModal(true)} className="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-blue-200 transition flex items-center gap-2"><PlusIcon/> New Order</button>
              </div>
              <div className="grid gap-3">
                {orders.length === 0 ? (
                  <div className="text-center py-12 bg-white rounded-2xl border border-gray-200 text-gray-400">
                    <p className="font-semibold">No orders drafted or sent yet.</p>
                    <p className="text-xs mt-1">Tap "+ New Order" to dispatch products.</p>
                  </div>
                ) : orders.map(o => (
                  <div key={o.id} className="bg-white p-5 rounded-2xl border-2 border-gray-200 hover:border-blue-400 flex justify-between items-center cursor-pointer transition shadow-sm" onClick={() => {setEditingOrder(o); setCurrentView('edit-order');}}>
                    <div>
                      <p className="font-bold text-gray-900">{o.brandName}</p>
                      <p className="text-[10px] text-gray-400 mt-1">{new Date(o.createdAt).toLocaleDateString()}</p>
                    </div>
                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold ${o.status === 'sent' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-amber-50 text-amber-700 border border-amber-200'} border`}>{o.status}</span>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="space-y-6">
              <div className="flex justify-between items-center">
                <button onClick={() => setCurrentView('dashboard')} className="text-xs text-blue-600 font-bold tracking-wider hover:underline">← BACK TO DASHBOARD</button>
                <button onClick={() => handleDeleteOrder(editingOrder.id)} className="p-2.5 text-gray-400 hover:text-red-500 rounded-lg hover:bg-red-50 transition" title="Delete Entire Order"><TrashIcon/></button>
              </div>
              
              <div className="space-y-1">
                <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">Brand Name</label>
                <input value={editingOrder.brandName} onChange={e=>setEditingOrder({...editingOrder, brandName: e.target.value})} className="text-2xl font-bold w-full bg-white border-2 border-gray-300 rounded-xl p-3 outline-none focus:border-blue-600 text-gray-900 shadow-sm"/>
              </div>
              
              <div className="space-y-3">
                <div className="grid grid-cols-12 gap-2 mb-1 text-[11px] font-extrabold text-gray-500 uppercase tracking-wider px-1">
                  <div className="col-span-3">Item Code</div>
                  <div className="col-span-4">Product Name</div>
                  <div className="col-span-2">Size</div>
                  <div className="col-span-2">Qty</div>
                  <div className="col-span-1 text-center"></div>
                </div>

                <div className="space-y-2">
                  {editingOrder.items.map((item, idx) => (
                    <div key={item.id} className="grid grid-cols-12 gap-2 items-center text-xs">
                      <div className="col-span-3">
                        <input placeholder="Code" value={item.code} onChange={e=>handleUpdateItem(item.id,'code',e.target.value)} className="p-3 bg-white border-2 border-gray-300 rounded-xl w-full outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition font-medium text-gray-800"/>
                      </div>
                      <div className="col-span-4">
                        <input placeholder="Name" value={item.name} onChange={e=>handleUpdateItem(item.id,'name',e.target.value)} className="p-3 bg-white border-2 border-gray-300 rounded-xl w-full outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition font-medium text-gray-800"/>
                      </div>
                      <div className="col-span-2">
                        <input placeholder="Size" value={item.size} onChange={e=>handleUpdateItem(item.id,'size',e.target.value)} className="p-3 bg-white border-2 border-gray-300 rounded-xl w-full outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition font-medium text-gray-800"/>
                      </div>
                      <div className="col-span-2">
                        <input placeholder="Qty" value={item.qty} onChange={e=>handleUpdateItem(item.id,'qty',e.target.value)} className="p-3 bg-white border-2 border-gray-300 rounded-xl w-full outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 font-bold text-gray-800 transition"/>
                      </div>
                      <div className="col-span-1 flex justify-center">
                        <button type="button" onClick={() => handleRemoveItemRow(item.id)} className="p-2 text-gray-400 hover:text-red-500 rounded-lg hover:bg-red-50 transition" title="Delete Row">
                          <TrashIcon />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={addItemRow} className="w-full py-3.5 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 text-xs font-bold hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 transition-all flex items-center justify-center gap-1.5">+ Add Product Row</button>

              <div className="flex gap-4 pt-4">
                <button onClick={handleSaveOrder} className="flex-1 p-4 bg-gray-100 hover:bg-gray-200 rounded-xl font-bold text-sm text-gray-600 transition">Save Draft</button>
                <button onClick={() => setShowShareModal(true)} className="flex-1 p-4 bg-blue-700 hover:bg-blue-800 text-white rounded-xl font-bold text-sm shadow-lg shadow-blue-200 transition">Confirm & Send</button>
              </div>
            </div>
          )}
          </div>
          <Footer/>

          {showNewOrderModal && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <form onSubmit={handleStartNewOrder} className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl border border-gray-100">
                <h3 className="font-bold text-lg mb-4 text-gray-800">New Order Sheet</h3>
                <div className="space-y-1.5 mb-5">
                  <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">Brand Name</label>
                  <input required placeholder="Enter Brand Name" className="w-full p-4 bg-white border-2 border-gray-300 rounded-xl outline-none focus:border-blue-600 transition text-gray-800 font-medium" onChange={e=>setNewBrandName(e.target.value)}/>
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={() => setShowNewOrderModal(false)} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold text-sm text-gray-600 transition">Cancel</button>
                  <button type="submit" className="flex-1 bg-blue-700 hover:bg-blue-800 text-white p-4 rounded-xl font-bold text-sm transition">Create Sheet</button>
                </div>
              </form>
            </div>
          )}

          {showShareModal && (
            <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <form onSubmit={executeWhatsApp} className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl border border-gray-100">
                <h3 className="font-bold text-lg mb-4 text-gray-800">Send via WhatsApp</h3>
                <div className="space-y-1.5 mb-5">
                  <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">WhatsApp Number</label>
                  <input required className="w-full p-4 bg-white border-2 border-gray-300 rounded-xl outline-none focus:border-blue-600 transition text-gray-800 font-medium" placeholder="e.g. 919876543210" onChange={e=>setWhatsAppNumber(e.target.value)}/>
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={() => setShowShareModal(false)} className="flex-1 p-4 bg-gray-100 rounded-xl font-bold text-sm text-gray-600 transition">Cancel</button>
                  <button type="submit" className="flex-1 bg-green-600 hover:bg-green-700 text-white p-4 rounded-xl font-bold text-sm transition">Send Now</button>
                </div>
              </form>
            </div>
          )}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
